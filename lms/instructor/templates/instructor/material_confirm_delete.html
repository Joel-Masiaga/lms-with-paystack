{% extends 'home/base.html' %}

{% block title %}Delete Material — Kuza Ndoto Academy{% endblock %}

{% block content %}
<main class="flex-1 overflow-y-auto bg-gray-50 dark:bg-gray-900 pb-12">
    <div class="p-6 max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-6">Confirm Deletion</h1>
        
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-8">
            <p class="text-gray-700 dark:text-gray-300 mb-6 text-lg">
                Are you sure you want to delete the material <span class="font-bold underline">"{{ object.title }}"</span>?
                This action cannot be undone.
            </p>
            
            <form method="post" class="flex gap-4">
                {% csrf_token %}
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">
                    Yes, Delete Material
                </button>
                <a href="{% url 'instructor_lesson_detail' object.lesson.pk %}" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 font-medium py-2.5 px-8 rounded-lg transition-colors">
                    No, Go Back
                </a>
            </form>
        </div>
    </div>
</main>
{% endblock %}
